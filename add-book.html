<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Book - LMS</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard-ui.css">
</head>
<body class="dashboard-page">

<div id="addBookApp" class="dashboard">

    <div class="sidebar">
        <div class="logo-container">
    <img src="https://storage.googleapis.com/oa_disk001/pcc/147/school_logo/1723516719-730.jpg" alt="PCC Logo" class="sidebar-logo">
    <h2>PCC LMS</h2>
</div>
        <ul>
            <li><a href="dashboard.html">Home</a></li>
            <li><a href="users.html">Users</a></li>
            <li id="logout">Logout</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h1>Add New Book</h1>
        </div>

        <div class="form-card">
            <form id="bookForm">
                <input type="text" id="bookTitle" name="title" placeholder="Book Title" autocomplete="off" required>
                <input type="text" id="bookAuthor" name="author" placeholder="Author" autocomplete="off" required>
                <input type="text" id="bookCategory" name="category" placeholder="Category" autocomplete="off" required>
                <input type="url" id="bookCoverUrl" name="coverUrl" placeholder="Cover Image URL (optional)" autocomplete="off">
                <textarea id="bookDescription" name="description" placeholder="Book description (optional)" rows="3"></textarea>
                <button type="submit">Add Book</button>
            </form>
        </div>
    </div>
</div>

<script src="js/lms.core.js" defer></script>
<script src="js/lms.auth.js" defer></script>
<script src="js/lms.dashboard.js" defer></script>
<script src="js/script.js" defer></script>
</body>
</html>
